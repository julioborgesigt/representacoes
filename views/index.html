<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representações Policiais</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header class="topbar">
    <span class="topbar-title">Representações Policiais</span>
    <div class="topbar-actions">
        <button id="btnNovo" class="btn btn-primary">+ Nova Representação</button>
        <form action="/logout" method="POST" style="display:inline">
            <button class="btn btn-ghost">Sair</button>
        </form>
    </div>
</header>

<!-- ── FILTROS ──────────────────────────────────────────────────────────────── -->
<section class="filtros">
    <div class="filtro-grupo">
        <label>Ano</label>
        <select id="fAno"></select>
    </div>
    <div class="filtro-grupo">
        <label>Mês</label>
        <select id="fMes">
            <option value="">Todos</option>
            <option value="1">Janeiro</option><option value="2">Fevereiro</option>
            <option value="3">Março</option><option value="4">Abril</option>
            <option value="5">Maio</option><option value="6">Junho</option>
            <option value="7">Julho</option><option value="8">Agosto</option>
            <option value="9">Setembro</option><option value="10">Outubro</option>
            <option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </div>
    <div class="filtro-grupo">
        <label>Vara</label>
        <select id="fVara"><option value="">Todas</option></select>
    </div>
    <div class="filtro-grupo">
        <label>Crime</label>
        <select id="fCrime"><option value="">Todos</option></select>
    </div>
    <div class="filtro-grupo">
        <label>Cidade</label>
        <select id="fCidade"><option value="">Todas</option></select>
    </div>
    <div class="filtro-grupo">
        <label>Situação</label>
        <select id="fStatus"><option value="">Todos</option></select>
    </div>
    <button id="btnFiltrar" class="btn btn-secondary">Filtrar</button>
    <button id="btnLimpar"  class="btn btn-ghost">Limpar</button>
</section>

<!-- ── TABELA ───────────────────────────────────────────────────────────────── -->
<main class="tabela-wrapper">
    <table id="tabelaRep">
        <thead>
            <tr>
                <th>Processo</th>
                <th>IP</th>
                <th>Vara</th>
                <th>Peticionante</th>
                <th>Crime</th>
                <th>Cidade</th>
                <th>Tipo de Pedido</th>
                <th>Alvos (Pedido)</th>
                <th>Alvos (Total)</th>
                <th>Sigilo</th>
                <th>Envio</th>
                <th>Ult. Verificação</th>
                <th>Situação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tbodyRep"></tbody>
    </table>
    <p id="msgVazia" class="msg-vazia hidden">Nenhum registro encontrado para os filtros selecionados.</p>
</main>

<!-- ── MODAL FORMULÁRIO ─────────────────────────────────────────────────────── -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box">
        <h2 id="modalTitulo">Nova Representação</h2>
        <form id="formRep" novalidate>
            <input type="hidden" id="fId">

            <div class="form-grid">
                <div class="field">
                    <label>Nº do Processo *</label>
                    <input id="fProcesso" required>
                </div>
                <div class="field">
                    <label>Nº do IP *</label>
                    <input id="fIp" required>
                </div>
                <div class="field">
                    <label>Vara Destino *</label>
                    <select id="fVaraForm" required></select>
                </div>
                <div class="field">
                    <label>Peticionante *</label>
                    <input id="fPeticionante" required>
                </div>
                <div class="field">
                    <label>Crime *</label>
                    <select id="fCrimeForm" required></select>
                </div>
                <div class="field">
                    <label>Cidade do Crime *</label>
                    <select id="fCidadeForm" required></select>
                </div>
                <div class="field">
                    <label>Tipo de Pedido *</label>
                    <select id="fTipoPedido" required></select>
                </div>
                <div class="field">
                    <label>Qtd. Alvos (este pedido) *</label>
                    <input id="fAlvosPedido" type="number" min="0" value="0" required>
                </div>
                <div class="field field-full">
                    <label>Qtd. Alvos Total *
                        <span class="dica-alvo">⚠ Atenção: não duplique alvos que possuam mais de um tipo de pedido.</span>
                    </label>
                    <input id="fAlvosTotal" type="number" min="0" value="0" required>
                </div>
                <div class="field">
                    <label>Tipo de Sigilo *</label>
                    <select id="fSigilo" required>
                        <option value="segredo_justica">Segredo de Justiça</option>
                        <option value="sigilo_absoluto">Sigilo Absoluto</option>
                    </select>
                </div>
                <div class="field">
                    <label>Senha do Processo</label>
                    <div class="senha-wrap">
                        <label class="check-label">
                            <input type="checkbox" id="fSemSenha"> Sem senha
                        </label>
                        <input id="fSenha" placeholder="Digite a senha (opcional)">
                    </div>
                </div>
                <div class="field">
                    <label>Data de Envio *</label>
                    <input id="fDataEnvio" type="date" required>
                </div>
                <div class="field">
                    <label>Data Última Verificação</label>
                    <input id="fDataVerificacao" type="date">
                </div>
                <div class="field">
                    <label>Situação *</label>
                    <select id="fStatusForm" required></select>
                </div>
            </div>

            <p id="formErro" class="erro hidden"></p>

            <div class="modal-footer">
                <button type="button" id="btnCancelar" class="btn btn-ghost">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script src="/static/js/app.js" type="module"></script>
</body>
</html>
