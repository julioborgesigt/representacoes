<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Representações Policiais</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">

    <div class="login-card">

        <div class="login-brand">
            <div class="login-shield">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                </svg>
            </div>
            <h1>Representações Policiais</h1>
            <p class="login-sub">Sistema de Gerenciamento — Acesso Restrito</p>
        </div>

        <form id="formLogin">
            <div class="field">
                <label for="login">Usuário</label>
                <input id="login" name="login" type="text"
                       autocomplete="username" required
                       placeholder="Digite seu usuário">
            </div>
            <div class="field">
                <label for="senha">Senha</label>
                <input id="senha" name="senha" type="password"
                       autocomplete="current-password" required
                       placeholder="••••••••">
            </div>
            <p id="loginErro" class="erro hidden"></p>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p class="login-footer">Acesso permitido somente a servidores autorizados.</p>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async e => {
            e.preventDefault();
            const erroEl = document.getElementById('loginErro');
            erroEl.classList.add('hidden');

            const resp = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login: e.target.login.value.trim(),
                    senha: e.target.senha.value,
                }),
            });

            if (resp.ok) {
                location.href = '/';
            } else {
                const { erro } = await resp.json();
                erroEl.textContent = erro;
                erroEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
