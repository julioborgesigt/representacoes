# Configuração de deploy para DomCloud (domcloud.co)
# Referência: https://domcloud.co/docs/deployment

source:
  repository: https://github.com/julioborgesigt/representacoes
  branch: main   # ajuste se usar outra branch

features:
  - node: lts
  - mysql: true

nginx:
  root: public_html        # raiz do repositório clonado
  passenger:
    enabled: "on"
    # DomCloud injeta $PORT — o servidor deve escutar nessa porta
    app_start_command: "env PORT=$PORT node src/server.js"

commands:
  - npm install --omit=dev
  - npm run setup
